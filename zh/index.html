<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>xylos — 专为 WebDAV 而生的极简开源网盘客户端</title>
  <meta name="description" content="xylos 是一个开源、轻量的 WebDAV 协议网盘客户端。支持 Basic / Digest / Bearer Token 认证，支持 macOS / Windows / Linux，让你管理远程文件像操作本地文件夹一样简单。">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="xylos — 极简 WebDAV 网盘客户端">
  <meta property="og:description" content="开源、轻量、即装即用。支持 Basic / Digest / Bearer Token 认证，让你的 WebDAV 服务器秒变本地磁盘。">
  <meta property="og:image" content="../imgs/zh/files-list.png">
  <meta property="og:locale" content="zh_CN">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="xylos — 极简 WebDAV 网盘客户端">
  <meta name="twitter:description" content="开源、轻量、即装即用。支持 Basic / Digest / Bearer Token 认证。">

  <!-- Canonical & Alternate -->
  <link rel="canonical" href="https://xylos.space/zh/">
  <link rel="alternate" hreflang="zh" href="https://xylos.space/zh/">
  <link rel="alternate" hreflang="en" href="https://xylos.space/en/">
  <link rel="alternate" hreflang="x-default" href="https://xylos.space/en/">

  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234ade80'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='monospace' font-size='20' font-weight='bold' fill='%23000'>x</text></svg>">
</head>
<body>

  <a href="#main-content" class="skip-link">跳到主要内容</a>

  <!-- Header -->
  <header class="site-header" role="banner">
    <div class="container">
      <a href="/zh/" class="site-logo" aria-label="xylos 首页">xylos</a>
      <nav class="nav-actions" aria-label="导航">
        <div class="lang-switch" role="group" aria-label="语言切换">
          <button data-lang="zh" aria-pressed="true">中文</button>
          <button data-lang="en" aria-pressed="false">EN</button>
        </div>
        <a href="https://github.com/maoyutofu/xylos-app" class="nav-gh-link" target="_blank" rel="noopener noreferrer" aria-label="在 GitHub 查看 xylos">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>
          <span>View on GitHub</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main-content">

    <!-- Hero -->
    <section class="hero" aria-labelledby="hero-title">
      <div class="container">
        <div class="hero-content">
          <span class="hero-badge" id="hero-badge"></span>
          <h1 class="hero-title" id="hero-title"></h1>
          <p class="hero-subtitle" id="hero-subtitle"></p>
          <div class="hero-actions">
            <a href="https://github.com/maoyutofu/xylos-app/releases" class="btn btn-primary" id="hero-cta-download" target="_blank" rel="noopener noreferrer"></a>
            <a href="https://github.com/maoyutofu/xylos-app" class="btn btn-outline" id="hero-cta-github" target="_blank" rel="noopener noreferrer"></a>
          </div>
        </div>
        <div class="hero-visual">
          <img src="../imgs/zh/files-list.png" alt="xylos 文件列表界面截图" width="1200" height="800" loading="eager" decoding="async">
        </div>
      </div>
    </section>

    <!-- Features -->
    <section class="section" aria-labelledby="features-heading">
      <div class="container">
        <span class="section-label">Features</span>
        <h2 class="section-heading" id="features-heading"></h2>
        <p class="section-subtitle" id="features-subtitle"></p>
        <div class="features-grid" id="features-grid" role="list"></div>
      </div>
    </section>

    <!-- Auth Methods -->
    <section class="section" aria-labelledby="auth-heading">
      <div class="container">
        <span class="section-label">Auth</span>
        <h2 class="section-heading" id="auth-heading"></h2>
        <p class="section-subtitle" id="auth-subtitle"></p>
        <div class="auth-cards" id="auth-grid" role="list"></div>
      </div>
    </section>

    <!-- Screenshots -->
    <section class="section" aria-labelledby="screenshots-heading">
      <div class="container">
        <span class="section-label">Screenshots</span>
        <h2 class="section-heading" id="screenshots-heading"></h2>
        <p class="section-subtitle" id="screenshots-subtitle"></p>
        <div class="screenshots-grid" role="list">
          <div class="screenshot-card reveal" role="listitem">
            <img src="../imgs/zh/files-list.png" alt="文件列表视图" loading="lazy" decoding="async">
            <span class="screenshot-label" id="scr-label-list"></span>
          </div>
          <div class="screenshot-card reveal" role="listitem">
            <img src="../imgs/zh/files-grid.png" alt="文件网格视图" loading="lazy" decoding="async">
            <span class="screenshot-label" id="scr-label-grid"></span>
          </div>
          <div class="screenshot-card reveal" role="listitem">
            <img src="../imgs/zh/server.png" alt="服务器管理" loading="lazy" decoding="async">
            <span class="screenshot-label" id="scr-label-server"></span>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <div class="footer-left">
        <span id="footer-copyright"></span>
      </div>
      <div class="footer-right">
        <a href="https://github.com/maoyutofu/xylos-app" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://github.com/maoyutofu/xylos-app/discussions" id="footer-contact"></a>
      </div>
    </div>
  </footer>

  <!-- i18n data -->
  <script src="../js/i18n.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
